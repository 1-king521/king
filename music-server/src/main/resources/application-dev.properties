server.port=8888


spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=2
spring.data.redis.timeout=1800000
spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-wait=-1
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=0

spring.datasource.url=jdbc:mysql://localhost:3306/music?serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=utf8&autoReconnect=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

minio.endpoint=http://localhost:9000
minio.access-key=admin
minio.secret-key=admin123
minio.bucket-name=user01

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# 含端口通配，避免 Vue CLI 抢端口导致（如 8082）不在名单而出现 Axios Network Error；生产勿用 *
app.security.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:8080,http://127.0.0.1:8080,http://localhost:8081,http://127.0.0.1:8081,http://localhost:*,http://127.0.0.1:*,http://localhost:5173,http://127.0.0.1:5173
app.security.login.max-failed-attempts=5
app.security.login.lock-minutes=10

# 忘记密码：验证码存 Redis
app.password-reset.code-ttl-minutes=10
# 开发环境可略短，避免连点测试时被 60s 卡住
app.password-reset.send-cooldown-seconds=15
# 本地不配 SMTP：为 true 时不发邮件，接口 data.debugCode 直出（前端展示）；生产务必 false
app.password-reset.mock-without-mail=true
# 真实发信且需排障时：为 true 时成功发信后 data 仍带 debugCode
app.password-reset.expose-code=false

