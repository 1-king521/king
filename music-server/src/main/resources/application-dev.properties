# ---------- Spring AI：DeepSeek（OpenAI 兼容，使用 spring-ai-starter-model-openai）----------
# 密钥任选其一（IDE：Run/Debug Configuration → Modify options → Environment variables）：
#   DEEPSEEK_API_KEY=sk-……
#   或 SPRING_AI_OPENAI_API_KEY=sk-……（Spring Boot 常用命名）
# 勿提交明文密钥；401 = 多为未读到密钥 / Key 错误 / 过期 / 余额不足，请到 https://platform.deepseek.com 核对。
spring.ai.openai.api-key=sk-16dba739f91d412bbc96e45c6010728d
# 仅填「协议 + 主机」，不要带 /v1/chat/completions（Spring AI 会自动追加该路径）
spring.ai.openai.base-url=https://api.deepseek.com
# 对话模型：deepseek-chat（常用）；推理版 deepseek-reasoner（官网文档为准）
spring.ai.openai.chat.options.model=deepseek-chat